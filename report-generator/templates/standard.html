<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
  @page {
    size: A4;
    margin: 18mm 14mm 22mm 14mm;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "PingFang TC", "Noto Sans TC", "Helvetica Neue", sans-serif;
    font-size: 12.5px;
    line-height: 1.75;
    color: #2c3e50;
    max-width: 780px;
    margin: 0 auto;
    padding: 0;
    background: #ffffff;
  }

  /* Headers */
  h1 {
    font-size: 24px;
    color: #ffffff;
    background: linear-gradient(135deg, #1a3a5c 0%, #2a6496 100%);
    padding: 14px 20px;
    margin: 36px -14px 20px -14px;
    border-radius: 4px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  h2 {
    font-size: 16px;
    color: #1a3a5c;
    margin: 28px 0 14px;
    padding: 8px 0 8px 14px;
    border-left: 5px solid #2a6496;
    background: linear-gradient(90deg, #e8f4fd 0%, transparent 100%);
    font-weight: 700;
  }

  h3 {
    font-size: 13.5px;
    color: #2a6496;
    margin: 18px 0 10px;
    padding-bottom: 4px;
    border-bottom: 1.5px dashed #bdd7ee;
    font-weight: 600;
  }

  h4 {
    font-size: 12.5px;
    color: #34495e;
    margin: 12px 0 6px;
    font-weight: 600;
  }

  /* Paragraphs */
  p { margin: 8px 0; }

  /* Tables */
  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    margin: 14px 0;
    font-size: 11px;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    table-layout: auto;
    word-wrap: break-word;
  }
  th {
    background: linear-gradient(135deg, #1a3a5c 0%, #234b6e 100%);
    color: #ffffff;
    padding: 8px 8px;
    text-align: left;
    font-weight: 600;
    font-size: 10.5px;
    letter-spacing: 0.3px;
    white-space: normal;
    word-break: break-all;
    min-width: 60px;
  }
  td {
    padding: 7px 8px;
    border-bottom: 1px solid #edf2f7;
    color: #2c3e50;
    white-space: normal;
    word-break: break-all;
    font-size: 11px;
  }
  tr:nth-child(even) { background: #f7fafc; }
  tr:hover { background: #edf2f7; }
  td:first-child { font-weight: 500; }

  /* Strong/Bold in tables */
  td strong, th strong { color: inherit; }

  /* Lists */
  ul, ol { padding-left: 22px; margin: 8px 0; }
  li { margin: 4px 0; }
  li::marker { color: #2a6496; }

  /* Code */
  code {
    background: #edf2f7;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 11px;
    font-family: "SF Mono", "Fira Code", monospace;
    color: #1a3a5c;
  }
  pre {
    background: #f0f4f8;
    color: #1a3a5c;
    padding: 14px;
    border-radius: 8px;
    overflow-x: auto;
    font-size: 11px;
    margin: 12px 0;
    border-left: 4px solid #2a6496;
    border: 1px solid #dce4ec;
  }

  /* Mermaid Charts */
  .mermaid, div[style*="text-align:center"] {
    text-align: center;
    margin: 20px 0;
    padding: 20px;
    background: #f7fafc;
    border-radius: 8px;
    border: 1px solid #e2e8f0;
  }

  /* Mermaid chart images - prevent oversized diagrams causing blank pages */
  .mermaid img, div[style*="text-align:center"] img, p img {
    max-width: 100%;
    max-height: 500px;
    height: auto;
    object-fit: contain;
    page-break-inside: avoid;
  }

  /* Blockquotes / Callouts */
  blockquote {
    padding: 14px 18px;
    border-radius: 6px;
    margin: 14px 0;
    font-size: 12px;
    background: #fff8e1;
    border-left: 5px solid #f5a623;
    color: #6b5900;
  }
  blockquote p { margin: 4px 0; }

  /* Callout Boxes */
  .callout {
    padding: 14px 18px;
    border-radius: 8px;
    margin: 16px 0;
    font-size: 12px;
  }
  .callout-info {
    background: #e8f4fd;
    border-left: 5px solid #2a6496;
    color: #1a3a5c;
  }
  .callout-warning {
    background: #fff8e1;
    border-left: 5px solid #f5a623;
    color: #6b5900;
  }
  .callout-danger {
    background: #fde8e8;
    border-left: 5px solid #e53e3e;
    color: #9b2c2c;
  }
  .callout-success {
    background: #e6f9ed;
    border-left: 5px solid #38a169;
    color: #276749;
  }

  /* Tags / Badges */
  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .badge-red { background: #fde8e8; color: #e53e3e; }
  .badge-yellow { background: #fff8e1; color: #d69e2e; }
  .badge-green { background: #e6f9ed; color: #38a169; }
  .badge-blue { background: #e8f4fd; color: #2a6496; }

  /* KPI Cards */
  .kpi-row {
    display: flex;
    gap: 14px;
    margin: 18px 0;
  }
  .kpi-card {
    flex: 1;
    background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
    border-radius: 10px;
    padding: 18px;
    text-align: center;
    border-top: 4px solid #2a6496;
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  }
  .kpi-card .value {
    font-size: 22px;
    font-weight: 800;
    color: #1a3a5c;
    letter-spacing: -0.5px;
  }
  .kpi-card .label {
    font-size: 10.5px;
    color: #718096;
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Highlight */
  mark, em em {
    background: linear-gradient(180deg, transparent 60%, #bdd7ee 60%);
    padding: 0 2px;
  }

  /* HR */
  hr {
    border: none;
    height: 2px;
    background: linear-gradient(90deg, #2a6496, transparent);
    margin: 28px 0;
  }

  /* SVG charts styling */
  svg {
    max-width: 100%;
    height: auto;
  }

  /* Print */
  @media print {
    body { font-size: 11.5px; }
    h1 { margin: 24px -14px 16px -14px; }
    .no-print { display: none; }
  }

  /* Page break */
  .page-break { page-break-before: always; }
</style>
</head>
<body>
{{CONTENT}}
</body>
</html>
